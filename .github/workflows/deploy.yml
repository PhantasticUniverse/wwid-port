name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same pinned toolchain as test.yml for reproducible builds.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.86
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wid

      - name: Build WASM
        working-directory: wid
        run: cargo build --target wasm32-unknown-unknown --release -p wid-wasm

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.100 --locked

      - name: Generate WASM bindings
        working-directory: wid
        run: wasm-bindgen target/wasm32-unknown-unknown/release/wid_wasm.wasm --out-dir ../web/wasm --target web

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The trailing slash matters: for a user/org page base_path is empty,
      # and a bare empty --base means a relative base, which breaks Vite's
      # module-worker URL resolution.
      - name: Build site
        working-directory: web
        run: |
          npm ci
          npx vite build --base "${{ steps.pages.outputs.base_path }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
