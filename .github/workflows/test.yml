name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wid

      - name: Run tests
        working-directory: wid
        run: cargo test

      - name: Clippy lint
        working-directory: wid
        run: cargo clippy -- -D warnings

      - name: Build WASM
        working-directory: wid
        run: cargo build --target wasm32-unknown-unknown --release -p wid-wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: TypeScript check
        working-directory: web
        run: |
          npm install
          npx tsc --noEmit

      - name: Vite build
        working-directory: web
        run: npx vite build
